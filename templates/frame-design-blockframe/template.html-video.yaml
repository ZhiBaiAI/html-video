spec_version: 1
id: frame-design-blockframe
name: BlockFrame
name_zh: 硬边积木框
description_zh: >
  新粗野主义积木感，粗黑边框、硬偏移阴影和彩色糖果点缀，适合年轻、直接、强视觉冲击的内容。
description: >
  Maximalist neobrutalist — thick black borders, hard offset shadows, candy accents

engine: hyperframes
engine_version: ^0.4.0
source_entry: index.html

category: presentation
subcategory: frame-md-design-system
tags: ["frame-md", "neobrutalist", "border", "candy", "bold", "maximal"]

best_for:
