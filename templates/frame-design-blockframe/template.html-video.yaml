    supported_aspects: ["16:9"]
  fps:
    default: 30
    supported: [30, 60]
  duration:
    type: variable
    min_sec: 3
    max_sec: 30
    default_sec: 10
  alpha: false
  audio: { supported: false, expected_inputs: [] }

inputs:
